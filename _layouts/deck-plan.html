<script id="deck-plan-data" type="application/json">{{ site.data.deck_plan | jsonify }}</script>
<script src="{{ '/assets/js/svg-pan-zoom.min.js' | relative_url }}"></script>
<script type="module" src="{{ '/assets/js/blueprint.js' | relative_url }}"></script>

<!-- Deck backdrop: inject the aged sea-chart above the flat #0f172a rect (behind every
     node), kept faint so the flow/icons/arrows stay legible. Runs before the deferred
     blueprint.js module, so svg-pan-zoom wraps it and it pans/zooms with the diagram.
     Done in JS (not deck-plan-svg.html) to leave that generated file untouched. -->
<script>
(function () {
  var svg = document.querySelector('svg.floor-svg');
  if (!svg) return;
  var url = '{{ "/assets/blueprint/bg3.png" | relative_url }}';
  var img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
  img.setAttribute('x', '0'); img.setAttribute('y', '0');
  img.setAttribute('width', '1040'); img.setAttribute('height', '740');
  img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
  img.setAttribute('opacity', '0.3');
  img.setAttribute('href', url);
  img.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', url);
  var bg = svg.querySelector('rect');
  if (bg) bg.after(img); else svg.insertBefore(img, svg.firstChild);
})();
</script>
