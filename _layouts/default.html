<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {%- comment -%} jekyll-seo-tag: title, description, canonical, Open Graph, Twitter cards, JSON-LD {%- endcomment -%}
    {%- seo -%}
    <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">

    {%- include components/google-analytics.html -%}
    <meta name="google-site-verification" content="CR6jNNEzT9Ae22Ce5tjJjS4KIM-GEwCNPuNAYHqwQ0k" />

    <link rel="shortcut icon" type="image/png" href="{{ "/favicon.png" | relative_url }}"/>


    <!-- Custom Style css -->
    <link rel="stylesheet" href="{{site.baseurl}}/assets/style.css">

    {% unless jekyll.environment == "production" %}
        <script>document.write('<script src="http://' + (location.host || 'localhost').split(':')[0] + ':35729/livereload.js?snipver=1"></' + 'script>')</script>
    {% endunless %}

</head>
<body>
  {{ content }}
</body>
</html>
