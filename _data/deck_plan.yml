# Detail-panel content for the /deck-plan/ diagram. Keys match the SVG node ids
# (data-node). Paths are site-absolute (leading /) since YAML isn't processed by
# Liquid, so they can't use relative_url — the site is served at its subdomain apex.
# `github` (owner/repo) shows a repo-logo link; `stars` is a baked-in snapshot of
# the GitHub star count (rendered as ⭐N) — static so every visitor gets it without
# per-visitor GitHub API calls (which rate-limit at 60/hr per IP). Refresh manually.
# Entries with only `href` are plain new-tab links, not detail panels.
Radarr:
  title: Radarr
  logo: /assets/blueprint/logos/radarr.svg
  github: Radarr/Radarr
  stars: 13904
  portrait: /assets/radarr.webp
  description: >
    The movie quartermaster. Watches for the films you want, grabs the best
    release the moment it appears, then renames and files it into your library.
  links:
    - { label: "Official site", url: "https://radarr.video" }
    - { label: "On the blog", url: "/blog/home-media-server/" }
  screenshots: []
