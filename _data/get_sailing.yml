# Card manifest for the /get-sailing/ hub. Rendered by _layouts/get-sailing.html
# as a "cargo hold" scene per group. Links hard-code the /htpc baseurl (YAML isn't
# processed by Liquid) — same convention as _data/deck_plan.yml. Keep groups in
# build order (keel → sails → swaps → shore leave). Curated on purpose: adding a
# blog post does NOT auto-add a card here.
#
# Per group: `scene` picks the backdrop + object type —
#   hold  → wooden crates, stencil-numbered (required, load in order)
#   deck  → lit deck, SVG instruments (art: id in pirate/gs-cargo-art.html)
#   dock  → swap crates ("hoisting" a replacement; `out` = the retired tool)
#   quay  → stone quay, SVG side-trip objects (art: id)
groups:
  - icon: "⚓"
    kick: "In the hold"
    title: "Lay the keel"
    tagline: "The three crates you can't sail without — load them in order."
    scene: "hold"
    req: "Required cargo"
    accent: "#e0b34a"
    cards:
      - kicker: "Understand"
        title: "Home Media Server"
        payoff: "What each container does & why this crew."
        links:
          - { label: "Read the briefing →", url: "/htpc/blog/home-media-server/" }
          - { label: "Study the blueprint →", url: "/htpc/deck-plan/" }
      - kicker: "Build"
        title: "Le Docker Compose"
        payoff: "Twelve containers, one file, docker compose up -d."
        links:
          - { label: "Copy-paste it →", url: "/htpc/blog/home-media-server-docker-compose/" }
      - kicker: "Command"
        title: "Container Management"
        payoff: "One dashboard so you never memorise a port again."
        links:
          - { label: "Pick a dashboard →", url: "/htpc/blog/home-media-server-management/" }
  - icon: "⛵"
    kick: "On deck"
    title: "Trim the sails"
    tagline: "Optional rigging & instruments — the never-think-about-it-again magic."
    scene: "deck"
    accent: "#4fd8c4"
    cards:
      - art: "spyglass"
        kicker: "Lists & watchlists"
        title: "Follow the tides"
        payoff: "Follow IMDb / Trakt lists — new releases sail in on their own."
        links:
          - { label: "Follow the tides →", url: "/htpc/blog/lists/" }
          - { label: "Add integrations →", url: "/htpc/blog/lists-part2/" }
      - art: "bell"
        kicker: "Notifications"
        title: "Word from the crow's nest"
        payoff: "Pinged the moment a title lands, however you like."
        links:
          - { label: "Set the watch →", url: "/htpc/blog/notifications/" }
      - art: "barrel"
        kicker: "Requests"
        title: "Requests from the crew"
        payoff: "Crew & guests ask in Seerr; the fleet delivers."
        links:
          - { label: "Open the request box →", url: "/htpc/blog/goodbye-ombi/" }
      - art: "quadrant"
        kicker: "Recyclarr"
        title: "The quality quartermaster"
        payoff: "Auto-tuned quality profiles from the TRaSH guides."
        links:
          - { label: "Weigh it up →", url: "/htpc/blog/recyclarr/" }
      - art: "watchtower"
        kicker: "Watchtower"
        title: "The self-updating fleet"
        payoff: "Auto-update the crew while you sleep."
        links:
          - { label: "Set the watchtower →", url: "/htpc/blog/watchtower/" }
