# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: PirateFlix
tagline: Home media server, automated # jekyll-seo-tag renders "PirateFlix | Home media server, automated" on the homepage
name: htpc
description: > # site-wide meta description (homepage + fallback); ~155 chars for full SERP width
  Build your own automated home media server with Docker. PirateFlix wires up
  Jellyfin, Radarr, Sonarr, Prowlarr and more into one copy-paste HTPC setup.
author:
  name: Wouter Van Schandevijl # hash form (no `twitter:`) so jekyll-seo-tag skips the invalid twitter:creator handle
logo: /assets/logo.webp # JSON-LD organization logo
baseurl: "/htpc" # the subpath of your site, e.g. /blog
url: "https://sangu.be" # the base hostname & protocol for your site, e.g. https://example.com

social:
  name: PirateFlix
  links:
    - https://github.com/SanguPackage/htpc

# Default Open Graph / Twitter share image (posts fall back to this when they set no `image`)
defaults:
  - scope:
      path: ""
    values:
      image: /assets/hero.webp


# Analytics — GA4 Measurement ID (G-XXXXXXXXXX). The old UA-30075487-3 property stopped
# processing data in July 2023; create a GA4 property and paste its ID here.
google_analytics: G-XXXXXXXXXX


# Blog
github_data_url: https://github.com/SanguPackage/htpc/blob/main/
collections:
  posts:
    output: true
    permalink: /blog/:categories/:title/

# Build settings
markdown: kramdown

# highlighter: We've implemented highlightjs manually
kramdown:
  syntax_highlighter_opts:
    disable : true


# https://pages.github.com/versions/
plugins:
  - jemoji # https://github.com/jekyll/jemoji
  - jekyll-gist # https://github.com/jekyll/jekyll-gist
  - jekyll-avatar # https://github.com/benbalter/jekyll-avatar
  - jekyll-redirect-from # https://github.com/jekyll/jekyll-redirect-from
  - jekyll-seo-tag # https://github.com/jekyll/jekyll-seo-tag
  - jekyll-sitemap # https://github.com/jekyll/jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - OTHERS.md      # internal notes — keep out of the published site
  - MIDJOURNEY.md  # internal notes — keep out of the published site
  - docs
  - test
