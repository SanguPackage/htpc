<svg viewBox="0 0 1040 330" role="img" aria-label="The voyage of a request">
  <defs>
    <!-- night sky: deep zenith easing down to a faint atmospheric glow just above the
         waterline; the wave layers below sit over its lowest band -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#081627"/>
      <stop offset=".42" stop-color="#0b1f33"/>
      <stop offset=".74" stop-color="#0e2b42"/>
      <stop offset=".88" stop-color="#123a54"/>
      <stop offset="1"   stop-color="#0a1d2d"/>
    </linearGradient>
    <!-- corner vignette to frame the scene; stays clear through the centre (offset .5) so the
         edge waypoint labels keep their contrast -->
    <radialGradient id="vignette" cx=".5" cy=".5" r=".78">
      <stop offset="0"  stop-color="#02070d" stop-opacity="0"/>
      <stop offset=".5" stop-color="#02070d" stop-opacity="0"/>
      <stop offset="1"  stop-color="#02070d" stop-opacity=".4"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1040" height="330" fill="url(#sky)"/>
  <!-- night sky: moon + twinkling stars -->
  <g class="sky">
    <defs>
      <mask id="moon-crescent">
        <circle cx="118" cy="52" r="16" fill="#fff"/>
        <circle cx="127" cy="46" r="14.5" fill="#000"/>
      </mask>
    </defs>
    <!-- soft corona, centred on the lit crescent so the glow hugs it -->
    <circle cx="111" cy="55" r="25" fill="#e9dfc4" opacity=".05"/>
    <circle cx="111" cy="55" r="17" fill="#e9dfc4" opacity=".08"/>
    <!-- crescent: masked so no opaque disc sits over the corona -->
    <circle cx="118" cy="52" r="16" fill="#efe7cf" mask="url(#moon-crescent)"/>
    <g fill="#e9dfc4">
      <!-- four-point sparkles -->
      <path transform="translate(210 34)" d="M0,-5 L1.1,-1.1 5,0 1.1,1.1 0,5 -1.1,1.1 -5,0 -1.1,-1.1 Z" opacity=".8">
        <animate attributeName="opacity" values=".3;.95;.3" dur="3.6s" begin="0s" repeatCount="indefinite"/></path>
      <path transform="translate(648 30)" d="M0,-4 L.9,-.9 4,0 .9,.9 0,4 -.9,.9 -4,0 -.9,-.9 Z" opacity=".8">
        <animate attributeName="opacity" values=".3;.95;.3" dur="3.1s" begin="1.3s" repeatCount="indefinite"/></path>
    </g>
    <g fill="#cfe3f2">
      <circle cx="180" cy="26" r="1.4"><animate attributeName="opacity" values=".25;1;.25" dur="3s"   begin="0s"   repeatCount="indefinite"/></circle>
      <circle cx="252" cy="54" r="1.1"><animate attributeName="opacity" values=".25;1;.25" dur="2.4s" begin=".6s"  repeatCount="indefinite"/></circle>
      <circle cx="300" cy="20" r="1.6"><animate attributeName="opacity" values=".25;1;.25" dur="3.5s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="366" cy="42" r="1.2"><animate attributeName="opacity" values=".25;1;.25" dur="2.8s" begin=".3s"  repeatCount="indefinite"/></circle>
      <circle cx="432" cy="24" r="1.5"><animate attributeName="opacity" values=".25;1;.25" dur="3.2s" begin="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="502" cy="50" r="1.1"><animate attributeName="opacity" values=".25;1;.25" dur="2.6s" begin=".9s"  repeatCount="indefinite"/></circle>
      <circle cx="566" cy="22" r="1.3"><animate attributeName="opacity" values=".25;1;.25" dur="3s"   begin=".2s"  repeatCount="indefinite"/></circle>
      <circle cx="620" cy="48" r="1.5"><animate attributeName="opacity" values=".25;1;.25" dur="3.4s" begin="1.3s" repeatCount="indefinite"/></circle>
      <circle cx="694" cy="28" r="1.2"><animate attributeName="opacity" values=".25;1;.25" dur="2.7s" begin=".7s"  repeatCount="indefinite"/></circle>
      <circle cx="762" cy="50" r="1.4"><animate attributeName="opacity" values=".25;1;.25" dur="3.1s" begin="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="834" cy="26" r="1.5"><animate attributeName="opacity" values=".25;1;.25" dur="2.9s" begin=".4s"  repeatCount="indefinite"/></circle>
      <circle cx="892" cy="44" r="1.1"><animate attributeName="opacity" values=".25;1;.25" dur="2.5s" begin="1.2s" repeatCount="indefinite"/></circle>
    </g>
  </g>
  <!-- shooting star: rare diagonal streak. The motion travels only during the first
       ~12% of an 11s cycle then parks at the end point (keyPoints hold) and the flash
       is gated to the same window, so it reads as an occasional event, not a loop. -->
  <g class="shooting-star" fill="#eaf2fb">
    <g>
      <circle r="1.6"/>
      <path d="M0,0 L-24,-0.9 L-24,0.9 Z" opacity=".55"/>
      <animate attributeName="opacity" begin="3s" dur="11s" repeatCount="indefinite"
               keyTimes="0;.02;.09;.12;1" values="0;1;1;0;0"/>
    </g>
    <animateMotion begin="3s" dur="11s" repeatCount="indefinite" rotate="auto"
                   calcMode="linear" keyTimes="0;.12;1" keyPoints="0;1;1" path="M872,22 L706,74"/>
  </g>
  <!-- compass -->
  <g transform="translate(958 54)" opacity=".85">
    <circle r="30" fill="none" stroke="#254a68" stroke-width="1.5"/>
    <path d="M0,-30 6,0 0,30 -6,0 Z" fill="#e0b34a"/>
    <path d="M-30,0 0,6 30,0 0,-6 Z" fill="#254a68"/>
    <text x="0" y="-36" fill="#7d9bb4" font="10px monospace" text-anchor="middle">N</text>
  </g>
  <!-- route -->
  <path id="rt" class="route" d="M70,235 C200,120 330,120 430,150 S650,240 720,150 S920,70 980,150"/>
  <!-- port glow rings (expand + fade as the ship arrives; timed to the 15s voyage) -->
  <g class="halos" fill="none" stroke="#4fd8c4" stroke-width="2">
    <circle cx="70"  cy="235" r="8">
      <animate attributeName="r"       dur="15s" repeatCount="indefinite" keyTimes="0;.14;1"           values="8;26;8"/>
      <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.06;.14;1"       values=".9;.5;0;0"/></circle>
    <circle cx="330" cy="133" r="8">
      <animate attributeName="r"       dur="15s" repeatCount="indefinite" keyTimes="0;.286;.4;1"       values="8;8;26;8"/>
      <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.286;.34;.4;1"   values="0;.9;.5;0;0"/></circle>
    <circle cx="560" cy="191" r="8">
      <animate attributeName="r"       dur="15s" repeatCount="indefinite" keyTimes="0;.524;.64;1"      values="8;8;26;8"/>
      <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.524;.58;.64;1"  values="0;.9;.5;0;0"/></circle>
    <circle cx="720" cy="150" r="8">
      <animate attributeName="r"       dur="15s" repeatCount="indefinite" keyTimes="0;.7;.82;1"        values="8;8;26;8"/>
      <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.7;.76;.82;1"    values="0;.9;.5;0;0"/></circle>
    <circle cx="980" cy="150" r="9">
      <animate attributeName="r"       dur="15s" repeatCount="indefinite" keyTimes="0;.9;1"            values="9;9;30"/>
      <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.9;1"             values="0;.95;0"/></circle>
  </g>
  <!-- waypoints -->
  <g font-family="monospace">
    <circle class="wp" cx="70"  cy="235" r="8"/><text class="wp-lbl" x="70" y="268" text-anchor="middle">You</text><text class="wp-sub" x="70" y="285" text-anchor="middle">"I want this film"</text>
    <circle class="wp" cx="330" cy="133" r="8"/><text class="wp-lbl" x="330" y="108" text-anchor="middle">The Fleet</text><text class="wp-sub" x="330" y="92" text-anchor="middle">Radarr · Sonarr</text>
    <circle class="wp" cx="560" cy="191" r="8"/><text class="wp-lbl" x="560" y="228" text-anchor="middle">The High Seas</text><text class="wp-sub" x="560" y="245" text-anchor="middle">Prowlarr · qBittorrent</text>
    <circle class="wp" cx="720" cy="150" r="8"/><text class="wp-lbl" x="720" y="130" text-anchor="middle">Home Port</text><text class="wp-sub" x="720" y="114" text-anchor="middle">Jellyfin</text>
    <circle class="wp" cx="980" cy="150" r="9" fill="#0d2032" stroke="#4fd8c4" stroke-width="2.5"/><text class="wp-lbl" x="980" y="182" text-anchor="middle" fill="#4fd8c4">Your Telly</text>
  </g>
  <!-- port lamps (bright core flashes on top of each dot as the ship passes) -->
  <g>
    <circle cx="70"  cy="235" r="5" fill="#bfeee6" opacity="0"><animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.05;.12;1"          values=".95;.5;0;0"/></circle>
    <circle cx="330" cy="133" r="5" fill="#bfeee6" opacity="0"><animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.276;.286;.34;1"    values="0;0;.95;0;0"/></circle>
    <circle cx="560" cy="191" r="5" fill="#bfeee6" opacity="0"><animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.514;.524;.58;1"    values="0;0;.95;0;0"/></circle>
    <circle cx="720" cy="150" r="5" fill="#bfeee6" opacity="0"><animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.69;.7;.76;1"       values="0;0;.95;0;0"/></circle>
    <circle cx="980" cy="150" r="6" fill="#bfeee6" opacity="0"><animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;.9;1"              values="0;0;1"/></circle>
  </g>
  <!-- Whale breaching now and then, behind the waves so it rises out of the sea.
       No JS: four breach arcs at different spots are chained by syncbase timing
       (each begins a few s after the previous ends, with uneven gaps), so the whale
       surfaces in a different place at irregular intervals — reads as random. It is
       parked far below the waterline (hidden) whenever no breach is running. -->
  <g class="whale">
    <g transform="scale(.9)">
      <!-- tail fluke -->
      <path fill="#1c3d54" d="M-20,3 C-27,-2 -31,-6 -35,-5 C-32,-1 -33,3 -30,6 C-34,7 -30,11 -24,7 C-22,6 -21,5 -20,3 Z"/>
      <!-- body -->
      <path fill="#1c3d54" d="M-21,3 C-17,-8 -2,-12 10,-9 C18,-7 23,-2 24,2 C23,6 16,9 8,9 C-4,10 -16,9 -21,3 Z"/>
      <!-- belly -->
      <path fill="#5c8095" opacity=".55" d="M-15,6 C-4,9 7,9 16,4 C9,10 -4,11 -15,6 Z"/>
      <!-- pectoral flipper -->
      <path fill="#173547" d="M3,7 C6,12 11,16 8,18 C4,15 0,11 -1,7 Z"/>
      <!-- dorsal highlight + eye -->
      <path fill="#7ba0b3" opacity=".5" d="M-14,-6 C-3,-10 8,-9 17,-4 C8,-7 -4,-8 -14,-6 Z"/>
      <circle cx="16" cy="-1" r="1.2" fill="#08131f"/>
    </g>
    <!-- park below the waterline (hidden) until the first breach; freeze keeps the
         whale at each breach's end point (also below water) between surfacings -->
    <animateMotion id="brInit" begin="0s" dur=".1s" fill="freeze" path="M470,440 L470,441"/>
    <animateMotion id="brA" begin="2s; brD.end+7s"    dur="2.8s" fill="freeze" rotate="auto" path="M204,352 C226,320 238,279 250,278 C262,279 274,320 296,352"/>
    <animateMotion id="brB" begin="brA.end+9s"        dur="2.8s" fill="freeze" rotate="auto" path="M836,352 C858,322 868,283 880,282 C892,283 902,322 924,352"/>
    <animateMotion id="brC" begin="brB.end+6s"        dur="2.8s" fill="freeze" rotate="auto" path="M420,352 C444,320 458,275 470,274 C482,275 496,320 520,352"/>
    <animateMotion id="brD" begin="brC.end+8s"        dur="2.8s" fill="freeze" rotate="auto" path="M640,352 C660,324 670,287 680,286 C690,287 700,324 720,352"/>
  </g>
  <!-- splash at each breach's re-entry point, triggered off that breach's start -->
  <g class="splash" fill="#dceaf5">
    <circle cx="290" cy="328" r="2" fill="none" stroke="#dceaf5" stroke-width="1.2" opacity="0"><animate attributeName="r" begin="brA.begin+2.35s" dur=".6s" values="2;13"/><animate attributeName="opacity" begin="brA.begin+2.35s" dur=".6s" values=".75;0"/></circle>
    <circle cx="285" cy="328" r="1.6" opacity="0"><animate attributeName="cy" begin="brA.begin+2.35s" dur=".55s" values="328;313"/><animate attributeName="opacity" begin="brA.begin+2.35s" dur=".55s" values=".85;0"/></circle>
    <circle cx="296" cy="328" r="1.6" opacity="0"><animate attributeName="cy" begin="brA.begin+2.35s" dur=".55s" values="328;315"/><animate attributeName="opacity" begin="brA.begin+2.35s" dur=".55s" values=".85;0"/></circle>

    <circle cx="918" cy="328" r="2" fill="none" stroke="#dceaf5" stroke-width="1.2" opacity="0"><animate attributeName="r" begin="brB.begin+2.35s" dur=".6s" values="2;13"/><animate attributeName="opacity" begin="brB.begin+2.35s" dur=".6s" values=".75;0"/></circle>
    <circle cx="913" cy="328" r="1.6" opacity="0"><animate attributeName="cy" begin="brB.begin+2.35s" dur=".55s" values="328;313"/><animate attributeName="opacity" begin="brB.begin+2.35s" dur=".55s" values=".85;0"/></circle>
    <circle cx="924" cy="328" r="1.6" opacity="0"><animate attributeName="cy" begin="brB.begin+2.35s" dur=".55s" values="328;315"/><animate attributeName="opacity" begin="brB.begin+2.35s" dur=".55s" values=".85;0"/></circle>

    <circle cx="514" cy="328" r="2" fill="none" stroke="#dceaf5" stroke-width="1.2" opacity="0"><animate attributeName="r" begin="brC.begin+2.35s" dur=".6s" values="2;13"/><animate attributeName="opacity" begin="brC.begin+2.35s" dur=".6s" values=".75;0"/></circle>
    <circle cx="509" cy="328" r="1.6" opacity="0"><animate attributeName="cy" begin="brC.begin+2.35s" dur=".55s" values="328;313"/><animate attributeName="opacity" begin="brC.begin+2.35s" dur=".55s" values=".85;0"/></circle>
    <circle cx="520" cy="328" r="1.6" opacity="0"><animate attributeName="cy" begin="brC.begin+2.35s" dur=".55s" values="328;315"/><animate attributeName="opacity" begin="brC.begin+2.35s" dur=".55s" values=".85;0"/></circle>

    <circle cx="714" cy="328" r="2" fill="none" stroke="#dceaf5" stroke-width="1.2" opacity="0"><animate attributeName="r" begin="brD.begin+2.35s" dur=".6s" values="2;13"/><animate attributeName="opacity" begin="brD.begin+2.35s" dur=".6s" values=".75;0"/></circle>
    <circle cx="709" cy="328" r="1.6" opacity="0"><animate attributeName="cy" begin="brD.begin+2.35s" dur=".55s" values="328;313"/><animate attributeName="opacity" begin="brD.begin+2.35s" dur=".55s" values=".85;0"/></circle>
    <circle cx="720" cy="328" r="1.6" opacity="0"><animate attributeName="cy" begin="brD.begin+2.35s" dur=".55s" values="328;315"/><animate attributeName="opacity" begin="brD.begin+2.35s" dur=".55s" values=".85;0"/></circle>
  </g>
  <!-- lighthouse below Home Port, guiding the ship in. Drawn before the waves so the
       crests lap over its base (stands in the surf); beam slowly searches the upper sea. -->
  <g class="lighthouse" transform="translate(720 316)">
    <defs>
      <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#f4e6b0" stop-opacity=".38"/>
        <stop offset="1" stop-color="#f4e6b0" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="flare">
        <stop offset="0" stop-color="#fff2c8" stop-opacity=".95"/>
        <stop offset="1" stop-color="#f4e6b0" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <!-- lantern beam doing a full 360° turn about the vertical axis. A flat triangle that only
         flips left/right reads as a 180° wiper, so the turn is sold as perspective instead: the
         beam rotates a full circle in the screen plane (90 -> 450, starting front-facing) while
         the outer group squashes it vertically (scale y .4) into a circle-seen-from-above. The
         tip then traces an ellipse — sweeping down/front (toward viewer, t=0/1, paired with the
         flare below) round to up/back (t=.5, dim) — which the eye reads as one continuous turn.
         Both transforms pivot on the lantern, so the beam lives in its own group translated there. -->
    <g transform="translate(0 -28.5) scale(1 0.4)">
      <path d="M0,0 L74,-15 L74,15 Z" fill="url(#beam)">
        <animateTransform attributeName="transform" type="rotate" calcMode="linear"
                          values="90;450" dur="6s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- rocky islet so the tower stands on something instead of floating in open water -->
    <path d="M-22,11 L-15,-3 L-9,-6 L-3,-2 L0,-7 L4,-3 L10,-6 L16,-2 L22,11 Z" fill="#13293b"/>
    <path d="M-15,-3 L-9,-6 L-6,-3 Z M0,-7 L4,-3 L1,-2 Z M10,-6 L16,-2 L12,-2 Z" fill="#24455f" opacity=".7"/>
    <path d="M-7,0 L7,0 L4.5,-26 L-4.5,-26 Z" fill="#e9dfc4"/>
    <rect x="-5.6" y="-13" width="11.2" height="4.5" fill="#c14b3f"/>
    <rect x="-4" y="-31" width="8" height="5" rx="1" fill="#3a2c1a"/>
    <path d="M-5,-31 L5,-31 L0,-37 Z" fill="#7c4a2a"/>
    <circle cx="0" cy="-28.5" r="2.4" fill="#ffdd88">
      <animate attributeName="opacity" values=".7;1;.7" dur="2.4s" repeatCount="indefinite"/></circle>
    <!-- flash as the beam comes around to face the viewer (t=0/1 of the 6s turn) -->
    <circle cx="0" cy="-28.5" r="15" fill="url(#flare)" opacity="0">
      <animate attributeName="opacity" values="1;0;0;0;1" keyTimes="0;.14;.5;.86;1"
               dur="6s" repeatCount="indefinite"/></circle>
  </g>
  <!-- stormy sea: three swelling wave layers drifting against each other -->
  <g class="waves">
    <g>
      <path fill="#16384f" opacity=".5" d="M-120,330 L-120,316 q30,-13 60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0 L1200,330 Z"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-120,0;0,0" dur="11s" repeatCount="indefinite"/>
    </g>
    <g>
      <path fill="#103048" opacity=".72" d="M-88,330 L-88,320 q22,-11 44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 L1144,330 Z"/>
      <path fill="none" stroke="#cfe3f2" stroke-width="1.3" opacity=".16" d="M-88,320 q22,-11 44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0 t44,0"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;88,0;0,0" dur="7s" repeatCount="indefinite"/>
    </g>
    <g>
      <path fill="#0a1e30" opacity=".92" d="M-66,330 L-66,324 q16,-9 33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 L1122,330 Z"/>
      <path fill="none" stroke="#dceaf5" stroke-width="1.3" opacity=".22" d="M-66,324 q16,-9 33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0 t33,0"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-66,0;0,0" dur="5s" repeatCount="indefinite"/>
    </g>
  </g>
  <!-- ship -->
  <g class="ship">
    <g transform="scale(.85)">
      <g>
        <!-- masts + spars -->
        <line x1="0" y1="2" x2="0" y2="-25" stroke="#5a3b22" stroke-width="1.6"/>
        <line x1="12" y1="3" x2="21" y2="-1" stroke="#5a3b22" stroke-width="1.4"/>
        <!-- sails (billowing forward) -->
        <path d="M11,2 L20,-0.5 L11,-6 Z" fill="#e9dfc4"/>
        <path d="M1.2,-24 C8,-22 8,-16.5 1.2,-15 Z" fill="#efe7cf"/>
        <path d="M1.2,-13.5 C13,-10.5 13,-1.5 1.2,0.5 Z" fill="#e9dfc4"/>
        <line x1="6" y1="-11.5" x2="6" y2="-1" stroke="#c9bd97" stroke-width=".6"/>
        <!-- red pennant -->
        <path d="M0,-25 L-11,-23 L-7.5,-21.5 L-11,-20 L0,-18.5 Z" fill="#e2564a"/>
        <!-- hull -->
        <path d="M-13,2.5 L12.5,2.5 Q15.5,2.5 14,6 L11,11.5 Q9.5,13.5 6,13.5 L-6,13.5 Q-9.5,13.5 -11,11 L-13.5,6 Q-15,3 -13,2.5 Z" fill="#6d4a2c"/>
        <path d="M-13,3.4 L13.5,3.4" stroke="#e0b34a" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M-11,7 L12,7" stroke="#4a3018" stroke-width="1"/>
        <!-- bow foam -->
        <path d="M12.5,12.5 q4,0 6,2" fill="none" stroke="#e9dfc4" stroke-width="1" opacity=".7"/>
        <!-- payload: the fetched film reel, carried on the aft deck from Home Port (t=.72)
             to Your Telly. Fades in as the ship reaches port, resets when the voyage loops. -->
        <g class="cargo" transform="translate(-6 -2)" opacity="0">
          <circle r="5.2" fill="#e0b34a" opacity=".35"/>
          <circle r="3.4" fill="#2a2015" stroke="#e0b34a" stroke-width=".8"/>
          <circle r="1" fill="#e0b34a"/>
          <circle cx="0"    cy="-2.2" r=".6" fill="#e0b34a"/>
