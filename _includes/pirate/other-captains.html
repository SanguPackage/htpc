<section id="charts">
  <h2>Charts from other captains.</h2>
  <p class="sub">We're not sailing these seas alone — wisdom from fellow crews worth following.</p>
  <div class="fleet">
    {% for r in site.data.other_captains %}
      <div class="crew" style="--c:{{ r.accent }}">
        <div class="big">{{ r.glyph }}</div>
        <div class="n">{{ r.name }}</div><div class="r">{{ r.role }}</div>
        <div class="d">{{ r.blurb }}</div>
        <div class="more"><a class="btn" href="{{ r.url }}" target="_blank" rel="noopener">Set sail →</a></div>
      </div>
    {% endfor %}
  </div>
</section>
